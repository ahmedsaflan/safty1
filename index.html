<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeGuard - وضع النافذة العائمة</title>
    <style>
        :root { --main-bg: #f8f9fa; --accent: #28a745; --danger: #dc3545; --warning: #ffc107; }
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: var(--main-bg); margin: 0; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 450px; margin: auto; }
        #status { font-size: 1.1rem; margin: 15px 0; font-weight: bold; color: #2c3e50; }
        canvas { display: none; } /* لوحة رسم مخفية لتحويل البيانات لفيديو */
        video { width: 100%; border-radius: 12px; background: #000; display: none; margin-top: 10px; }
        .btn { padding: 18px; font-size: 1.1rem; cursor: pointer; border: none; border-radius: 15px; width: 100%; margin-top: 15px; font-weight: bold; color: white; transition: 0.3s; }
        .btn-start { background: var(--accent); }
        .btn-pip { background: #007bff; display: none; }
        .btn-cancel { background: var(--danger); display: none; }
    </style>
</head>
<body>

    <div class="card">
        <div style="font-size: 3rem;">🛡️</div>
        <h2>نظام الحماية المستمرة</h2>
        <div id="status">اتبع الخطوات لتفعيل الرصد فوق التطبيقات</div>

        <canvas id="renderCanvas" width="300" height="200"></canvas>
        <video id="pipVideo" autoplay muted playsinline></video>

        <button id="startBtn" class="btn btn-start" onclick="initSystem()">1. بدء تشغيل الرصد</button>
        <button id="pipBtn" class="btn btn-pip" onclick="togglePiP()">2. تفعيل النافذة العائمة (هام)</button>
        <button id="cancelBtn" class="btn btn-cancel" onclick="resetSystem()">إلغاء الإنذار (أنا بخير ✅)</button>
    </div>

    <script>
        const TG_TOKEN = "8633912015:AAGxck5kIDmVYJhcgx_SLb94LWomH9uxwpU";
        const CHAT_ID = "1400827294";

        const canvas = document.getElementById('renderCanvas');
        const ctx = canvas.getContext('2d');
        const video = document.getElementById('pipVideo');
        
        let liveAcc = 0, maxAcc = 0, statusLabel = "جاري الرصد...";
        let isFallDetected = false, countdown = 5, timer;

        // تحديث واجهة "الفيديو" المصغر
        function drawFrame() {
            ctx.fillStyle = isFallDetected ? "#dc3545" : "#28a745";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "white";
            ctx.textAlign = "center";
            ctx.font = "bold 22px Arial";
            ctx.fillText(isFallDetected ? "⚠️ سقوط!!" : "✅ محمي", 150, 50);
            ctx.font = "50px Monospace";
            ctx.fillText(isFallDetected ? countdown : liveAcc.toFixed(1), 150, 120);
            ctx.font = "14px Arial";
            ctx.fillText("قوة الارتطام الحالية: " + maxAcc.toFixed(1), 150, 170);
            requestAnimationFrame(drawFrame);
        }

        async function initSystem() {
            navigator.geolocation.getCurrentPosition(()=>{}, ()=>{alert("يجب تفعيل GPS")});
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                const state = await DeviceMotionEvent.requestPermission();
                if (state === 'granted') startMonitoring();
            } else { startMonitoring(); }
        }

        function startMonitoring() {
            window.addEventListener('devicemotion', (e) => {
                let acc = e.accelerationIncludingGravity;
                if (!acc.x) return;
                liveAcc = Math.sqrt(acc.x**2 + acc.y**2 + acc.z**2);
                if (liveAcc > maxAcc) maxAcc = liveAcc;
                
                if (!isFallDetected && liveAcc > 22) {
                    isFallDetected = true;
                    triggerAlarm();
                }
            });

            const stream = canvas.captureStream();
            video.srcObject = stream;
            document.getElementById('startBtn').style.display = "none";
            document.getElementById('pipBtn').style.display = "block";
            document.getElementById('status').innerText = "اضغط الزر الأزرق لتصغير النافذة";
            drawFrame();
        }

        async function togglePiP() {
            try {
                await video.requestPictureInPicture();
                document.getElementById('status').innerText = "الرصد يعمل الآن فوق التطبيقات ✅";
            } catch (err) { alert("تأكد من استخدام متصفح كروم وتفاعل مع الصفحة أولاً"); }
        }

        function triggerAlarm() {
            document.getElementById('cancelBtn').style.display = "block";
            countdown = 5;
            timer = setInterval(() => {
                countdown--;
                if (countdown <= 0) {
                    clearInterval(timer);
                    if (isFallDetected) sendEmergency();
                }
            }, 1000);
        }

        function resetSystem() {
            clearInterval(timer);
            isFallDetected = false;
            document.getElementById('cancelBtn').style.display = "none";
            document.getElementById('status').innerText = "تم الإلغاء.. الرصد مستمر";
        }

        function sendEmergency() {
            navigator.geolocation.getCurrentPosition((pos) => {
                const map = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent("🚨 سقوط مؤكد!\nالموقع: " + map)}&disable_notification=false`);
            });
        }
    </script>
</body>
</html>
