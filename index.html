<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeGuard Hybrid</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #f0f2f5; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        .btn { padding: 20px; font-size: 1.2rem; cursor: pointer; border: none; border-radius: 15px; width: 100%; font-weight: bold; color: white; background: #27ae60; }
        #status { margin: 20px 0; font-weight: bold; color: #2c3e50; }
        .bg-mode { font-size: 0.8rem; color: #666; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>نظام الحماية الذكي</h2>
        <div id="status">جاهز للرصد..</div>
        <button id="startBtn" class="btn" onclick="startHybridSystem()">تفعيل الحماية</button>
        <div class="bg-mode">يستخدم تقنية "تتبع الموقع" للبقاء نشطاً في الخلفية.</div>
    </div>

    <script>
        const TG_TOKEN = "8633912015:AAGxck5kIDmVYJhcgx_SLb94LWomH9uxwpU";
        const CHAT_ID = "1400827294";
        
        let lastLat, lastLon, watchID;

        function startHybridSystem() {
            document.getElementById('startBtn').style.display = "none";
            document.getElementById('status').innerText = "✅ الحماية نشطة.. يمكنك الخروج الآن";

            // 1. تفعيل الحساسات (للعمل في الواجهة)
            if (window.DeviceMotionEvent) {
                window.addEventListener('devicemotion', handleMotion);
            }

            // 2. تفعيل تتبع الموقع المستمر (لضمان بقاء المتصفح نشطاً في الخلفية)
            if (navigator.geolocation) {
                watchID = navigator.geolocation.watchPosition(
                    (pos) => {
                        // تحديث الإحداثيات باستمرار يخبر النظام أننا "ملاحقة نشطة"
                        lastLat = pos.coords.latitude;
                        lastLon = pos.coords.longitude;
                        console.log("تحديث الموقع في الخلفية...");
                    },
                    (err) => console.log(err),
                    { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
                );
            }
        }

        function handleMotion(event) {
            let acc = event.accelerationIncludingGravity;
            let total = Math.sqrt(acc.x**2 + acc.y**2 + acc.z**2);
            
            if (total > 25) { // رصد ارتطام
                triggerEmergency();
            }
        }

        function triggerEmergency() {
            const mapUrl = `https://www.google.com/maps?q=${lastLat},${lastLon}`;
            fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent("🚨 تنبيه طارئ: تم رصد سقوط!\nالموقع: " + mapUrl)}`);
            alert("تم إرسال تنبيه سقوط!");
        }
    </script>
</body>
</html>
