<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SafeGuard - واجهة كبار السن</title>
    <style>
        :root { --bg: #f8f9fa; --primary: #28a745; --danger: #dc3545; --text: #2c3e50; }
        
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: var(--bg); 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden;
        }

        .card { 
            background: white; 
            padding: 40px 20px; 
            border-radius: 40px; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.15); 
            text-align: center; 
            width: 95%; 
            max-width: 500px;
        }

        .icon-box { font-size: 8rem; margin-bottom: 20px; }

        h2 { font-size: 2.5rem; color: var(--text); margin-bottom: 30px; }

        .status-badge { 
            margin: 30px 0; 
            padding: 25px; 
            border-radius: 25px; 
            background: #f1f3f5; 
            font-weight: bold; 
            font-size: 1.8rem; 
            border: 3px solid #dee2e6;
        }

        .active-status { 
            background: #e8f5e9; 
            color: #2e7d32; 
            border-color: #2ecc71; 
            animation: pulse-border 2s infinite;
        }

        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 0px rgba(46, 125, 50, 0.4); }
            100% { box-shadow: 0 0 0 20px rgba(46, 125, 50, 0); }
        }

        .btn { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 35px; 
            font-size: 2.2rem; 
            border-radius: 30px; 
            width: 100%; 
            cursor: pointer; 
            font-weight: bold; 
            box-shadow: 0 10px 25px rgba(40, 167, 69, 0.4);
            transition: transform 0.2s;
        }

        .btn:active { transform: scale(0.95); }

        #log { font-size: 1.2rem; color: #888; margin-top: 30px; font-weight: 500; }
    </style>
</head>
<body>

<div class="card">
    <div class="icon-box" id="mainIcon">🛡️</div>
    <h2 id="title">نظام الحماية</h2>
    
    <div id="status" class="status-badge">بانتظار الضغط..</div>
    
    <button id="startBtn" class="btn" onclick="igniteSystem()">تفعيل الحماية الآن</button>
    
    <div id="log">اضغط الزر الأخضر الكبير للبدء</div>
</div>

<script>
    const TG_TOKEN = "8633912015:AAGxck5kIDmVYJhcgx_SLb94LWomH9uxwpU";
    const CHAT_ID = "1400827294";

    async function igniteSystem() {
        // نطق صوتي لتأكيد العمل
        speak("بدأ الرصد، أنا أراقبك الآن");

        // 1. طلب الأذونات
        const notifyPerm = await Notification.requestPermission();
        
        // 2. إنشاء محرك الخلفية (Blob Service Worker)
        const swCode = `
            self.addEventListener('activate', e => {
                setInterval(() => {
                    self.registration.showNotification('SafeGuard نشط', {
                        body: 'نظام الحماية يعمل في الخلفية...',
                        tag: 'hb', silent: true
                    }).then(() => {
                        setTimeout(() => {
                            self.registration.getNotifications({tag: 'hb'}).then(ns => ns.forEach(n => n.close()));
                        }, 1500);
                    });
                }, 10000);
            });
        `;

        if ('serviceWorker' in navigator) {
            const blob = new Blob([swCode], { type: 'text/javascript' });
            const swUrl = URL.createObjectURL(blob);
            navigator.serviceWorker.register(swUrl);
        }

        // 3. تحديث الواجهة لتصبح ضخمة وواضحة
        document.getElementById('startBtn').style.display = "none";
        document.getElementById('status').innerText = "✅ الحماية تعمل";
        document.getElementById('status').classList.add('active-status');
        document.getElementById('mainIcon').innerText = "🟢";
        document.getElementById('log').innerText = "يمكنك وضع الجوال في جيبك الآن";

        // 4. الرصد (تقليل القوة لزيادة الحساسية من 30 إلى 22)
        startFallDetection();
    }

    function startFallDetection() {
        // إبقاء الـ GPS نشطاً لإجبار النظام على عدم النوم
        navigator.geolocation.watchPosition(() => {}, () => {}, { enableHighAccuracy: true });

        const handleMotion = (e) => {
            let a = e.accelerationIncludingGravity;
            if(!a.x) return; 

            let force = Math.sqrt(a.x**2 + a.y**2 + a.z**2);
            
            // تم تقليل الحساسية لـ 22 (أكثر استجابة للسقوط البسيط)
            if (force > 22) {
                sendAlert(force);
            }
        };

        if (typeof DeviceMotionEvent.requestPermission === 'function') {
            DeviceMotionEvent.requestPermission().then(p => {
                if (p === 'granted') window.addEventListener('devicemotion', handleMotion);
            });
        } else {
            window.addEventListener('devicemotion', handleMotion);
        }
    }

    function sendAlert(val) {
        speak("تم رصد سقوط، جاري إرسال موقعك");
        navigator.geolocation.getCurrentPosition(pos => {
            const map = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
            const msg = `🚨 نداء استغاثة!\nتم رصد سقوط محتمل بقوة ${val.toFixed(1)}\nالموقع: ${map}`;
            fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(msg)}`);
        });
    }

    function speak(text) {
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'ar-SA';
        window.speechSynthesis.speak(msg);
    }
</script>

</body>
</html>
