<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeGuard - تنبيه صوتي كامل</title>
    <style>
        :root { --main-bg: #f8f9fa; --accent: #28a745; --danger: #dc3545; }
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: var(--main-bg); margin: 0; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 450px; margin: auto; }
        .status-badge { background: #eef2f7; padding: 10px; border-radius: 10px; font-weight: bold; margin: 15px 0; font-size: 1.2rem; }
        .btn { padding: 18px; font-size: 1.2rem; cursor: pointer; border: none; border-radius: 15px; width: 100%; margin-top: 15px; font-weight: bold; color: white; }
        .btn-start { background: var(--accent); }
        .btn-cancel { background: var(--danger); display: none; height: 100px; font-size: 1.5rem; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(0.95); } 100% { transform: scale(1); } }
        #countdown-box { font-size: 5rem; color: var(--danger); font-weight: bold; display: none; margin: 10px 0; }
    </style>
</head>
<body>

    <div class="card">
        <div style="font-size: 3.5rem;">🚨</div>
        <h2>نظام حماية كبار السن</h2>
        <div class="status-badge" id="status">اضغط لتفعيل الحماية</div>

        <div id="countdown-box">5</div>

        <button id="startBtn" class="btn btn-start" onclick="activateSystem()">تفعيل الحماية الآن</button>
        <button id="cancelBtn" class="btn btn-cancel" onclick="resetSystem()">أنا بخير (إيقاف الإنذار) ✋</button>
    </div>

    <audio id="bgAudio" loop><source src="https://raw.githubusercontent.com/anars/blank-audio/master/10-seconds-of-silence.mp3"></audio>

    <script>
        const TG_TOKEN = "8633912015:AAGxck5kIDmVYJhcgx_SLb94LWomH9uxwpU";
        const CHAT_ID = "1400827294";

        let isFallDetected = false, countdown = 5, timer, audioCtx, sirenInterval;

        function activateSystem() {
            document.getElementById('bgAudio').play();
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission().then(state => { if (state === 'granted') startMonitoring(); });
            } else { startMonitoring(); }
        }

        function startMonitoring() {
            document.getElementById('startBtn').style.display = "none";
            document.getElementById('status').innerText = "✅ النظام يعمل ويراقب الحركة";
            window.addEventListener('devicemotion', (e) => {
                let acc = e.accelerationIncludingGravity;
                let total = Math.sqrt(acc.x**2 + acc.y**2 + acc.z**2);
                if (!isFallDetected && total > 22) {
                    isFallDetected = true;
                    triggerAlarm();
                }
            });
        }

        function triggerAlarm() {
            document.getElementById('status').innerText = "⚠️ تم رصد سقوط!";
            document.getElementById('countdown-box').style.display = "block";
            document.getElementById('cancelBtn').style.display = "block";
            
            // تشغيل صوت تنبيه (نغمة متقطعة) في جوال كبير السن
            startSiren();

            countdown = 5;
            timer = setInterval(() => {
                countdown--;
                document.getElementById('countdown-box').innerText = countdown;
                if (countdown <= 0) {
                    clearInterval(timer);
                    if (isFallDetected) sendEmergency();
                }
            }, 1000);
        }

        // دالة لعمل صوت صفارة إنذار قوية في الجوال
        function startSiren() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            sirenInterval = setInterval(() => {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(880, audioCtx.currentTime); // تردد مرتفع
                osc.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.5);
                gain.connect(audioCtx.destination);
                osc.connect(gain);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.5);
            }, 600);
        }

        function resetSystem() {
            clearInterval(timer);
            clearInterval(sirenInterval); // إيقاف الصوت فوراً
            isFallDetected = false;
            document.getElementById('status').innerText = "✅ تم الإلغاء.. الحماية مستمرة";
            document.getElementById('countdown-box').style.display = "none";
            document.getElementById('cancelBtn').style.display = "none";
        }

        function sendEmergency() {
            // إرسال الموقع للمراقب عبر تليجرام
            navigator.geolocation.getCurrentPosition((pos) => {
                const map = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                const msg = `🚨 *نداء استغاثة عاجل*\n\nتم رصد سقوط كبير السن في هذا الموقع:\n${map}`;
                fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(msg)}&parse_mode=Markdown&disable_notification=false`);
                document.getElementById('status').innerText = "🚨 تم إرسال موقعك للمراقب!";
            });
        }
    </script>
</body>
</html>
