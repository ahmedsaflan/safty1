<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>SafeGuard Background Pro</title>
    <script>
        // تسجيل الـ Service Worker لضمان العمل في الخلفية
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(() => {
                console.log("تم تسجيل محرك الخلفية بنجاح");
            });
        }

        async function startSystem() {
            // طلب إذن الموقع بشكل دائم
            const permission = await navigator.permissions.query({ name: 'geolocation' });
            if (permission.state === 'granted' || permission.state === 'prompt') {
                navigator.geolocation.watchPosition(() => {}, () => {}, { enableHighAccuracy: true });
                alert("بدأ الرصد.. النظام سيحاول البقاء نشطاً عبر محرك الخلفية");
            }
        }
    </script>
</head>
<body style="text-align:center; font-family:sans-serif; padding:50px;">
    <h2>نظام الحماية الفولاذي (نسخة SW)</h2>
    <button onclick="startSystem()" style="padding:20px; font-size:1.5rem; background:#27ae60; color:white; border:none; border-radius:15px;">تفعيل الرصد الدائم</button>
</body>
</html>
