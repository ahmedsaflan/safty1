<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام السلامة للسقوط - نسخة مستقرة</title>
    <style>
        :root { --main-bg: #f8f9fa; --accent: #28a745; --danger: #dc3545; --warning: #ffc107; }
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: var(--main-bg); transition: 0.3s; margin: 0; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 450px; margin: auto; }
        #status { font-size: 1.4rem; margin: 15px 0; font-weight: bold; color: #2c3e50; min-height: 1.6em; }
        .monitor-box { display: flex; justify-content: space-around; margin: 20px 0; gap: 10px; }
        .data-point { flex: 1; background: #e7f3ff; padding: 15px; border-radius: 12px; }
        .value { font-size: 1.5rem; font-weight: bold; color: #007bff; font-family: monospace; }
        #countdown-box { display: none; font-size: 4rem; color: var(--danger); font-weight: bold; margin: 10px 0; }
        .btn-start { padding: 18px 45px; font-size: 1.2rem; cursor: pointer; background: var(--accent); color: white; border: none; border-radius: 50px; width: 100%; }
        .waiting { background: var(--warning) !important; }
        .emergency { background: var(--danger) !important; color: white !important; }
    </style>
</head>
<body>

    <div class="card">
        <h2>🛡️ نظام السلامة للسقوط</h2>
        <div id="status">جاهز للرصد</div>
        <div id="countdown-box">5</div>

        <div class="monitor-box">
            <div class="data-point"><span style="font-size: 0.8rem;">الحركة الحالية</span><div id="live-val" class="value">0.00</div></div>
            <div class="data-point" style="background: #fff4e6; border: 1px dashed #fd7e14;"><span style="font-size: 0.8rem;">أقوى ارتطام</span><div id="max-val" class="value" style="color: #fd7e14;">0.00</div></div>
        </div>

        <button id="mainBtn" class="btn-start" onclick="initSystem()">تشغيل الرصد الآن</button>
    </div>

    <script>
        let isFallDetected = false;
        let canCancel = false; // متغير جديد للتحكم في وقت الإلغاء
        let maxImpact = 0;
        let countdownValue = 5;

        const IMPACT_THRESHOLD = 12;
        const WAIT_TIME = 5000;

        function initSystem() {
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission().then(state => { if (state === 'granted') startMonitoring(); });
            } else { startMonitoring(); }
        }

        function startMonitoring() {
            document.getElementById('mainBtn').style.display = 'none';
            document.getElementById('status').innerText = "جاري الرصد... ✅";
            window.addEventListener('devicemotion', handleMotion);
        }

        function handleMotion(event) {
            let acc = event.accelerationIncludingGravity;
            if (!acc || acc.x === null) return;

            let totalAcc = Math.sqrt(acc.x**2 + acc.y**2 + acc.z**2);
            document.getElementById('live-val').innerText = totalAcc.toFixed(2);

            if (totalAcc > maxImpact) {
                maxImpact = totalAcc;
                document.getElementById('max-val').innerText = maxImpact.toFixed(2);
            }

            // رصد الارتطام
            if (!isFallDetected && totalAcc > IMPACT_THRESHOLD) {
                isFallDetected = true;
                triggerWaitingSequence();
            }

            // منطق الإلغاء: لا يعمل إلا بعد مرور ثانيتين من الارتطام (لضمان استقرار الجهاز)
            if (isFallDetected && canCancel) {
                let move = event.acceleration;
                if (Math.abs(move.x) > 3 || Math.abs(move.y) > 3 || Math.abs(move.z) > 3) {
                    resetSystem();
                }
            }
        }

        function triggerWaitingSequence() {
            document.body.className = "waiting";
            document.getElementById('status').innerText = "⚠️ تم رصد ارتطام! جاري الفحص...";
            document.getElementById('countdown-box').style.display = "block";
            
            // قفل خاصية الإلغاء لمدة ثانية ونصف (تجاهل الارتدادات)
            canCancel = false;
            setTimeout(() => { canCancel = true; }, 1500);

            countdownValue = 5;
            let timer = setInterval(() => {
                countdownValue--;
                document.getElementById('countdown-box').innerText = countdownValue;
                if (countdownValue <= 0) {
                    clearInterval(timer);
                    if (isFallDetected) finalEmergency();
                }
            }, 1000);
        }

        function resetSystem() {
            isFallDetected = false;
            canCancel = false;
            document.body.className = "";
            document.getElementById('status').innerText = "جاري الرصد... ✅";
            document.getElementById('countdown-box').style.display = "none";
            document.getElementById('countdown-box').innerText = "5";
        }

        function finalEmergency() {
            document.body.className = "emergency";
            document.getElementById('status').innerText = "🚨 حالة طارئة: سقوط مؤكد!";
            document.getElementById('countdown-box').style.display = "none";
            // تشغيل الصوت
            const ctx = new AudioContext();
            const osc = ctx.createOscillator();
            osc.type = 'sawtooth';
            osc.connect(ctx.destination);
            osc.start();
        }
    </script>
</body>
</html>
