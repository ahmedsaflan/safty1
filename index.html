<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeGuard All-in-One</title>
    <style>
        :root { --bg: #f8f9fa; --primary: #28a745; --text: #2c3e50; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; color: var(--text); }
        .card { background: white; padding: 2.5rem; border-radius: 2rem; box-shadow: 0 15px 40px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 400px; }
        .pulse-button { background: var(--primary); color: white; border: none; padding: 1.2rem; border-radius: 1.2rem; width: 100%; font-size: 1.2rem; cursor: pointer; font-weight: bold; transition: 0.3s; box-shadow: 0 4px 15px rgba(40, 167, 69, 0.3); }
        .pulse-button:active { transform: scale(0.97); }
        .status-badge { margin: 1.5rem 0; padding: 1rem; border-radius: 1rem; background: #eee; font-weight: bold; font-size: 0.9rem; }
        .active { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
        #log { font-size: 0.7rem; color: #888; margin-top: 1rem; line-height: 1.4; }
    </style>
</head>
<body>

<div class="card">
    <div style="font-size: 4rem;">🛡️</div>
    <h2>نظام الحماية الموحد</h2>
    <div id="status" class="status-badge">بانتظار تفعيل المحرك...</div>
    <button id="startBtn" class="pulse-button" onclick="igniteSystem()">تفعيل الرصد الشامل</button>
    <div id="log">سيتم إنشاء محرك خلفية تلقائي لضمان الاستمرارية</div>
</div>

<script>
    const TG_TOKEN = "8633912015:AAGxck5kIDmVYJhcgx_SLb94LWomH9uxwpU";
    const CHAT_ID = "1400827294";

    async function igniteSystem() {
        // 1. طلب الأذونات الضرورية
        const notifyPerm = await Notification.requestPermission();
        
        // 2. إنشاء ملف sw.js وهمي (Blob) للعمل في الخلفية
        const swCode = `
            self.addEventListener('install', e => self.skipWaiting());
            self.addEventListener('activate', e => {
                e.waitUntil(self.clients.claim());
                setInterval(() => {
                    self.registration.showNotification('SafeGuard Active', {
                        body: 'يتم مراقبة الحركة في الخلفية...',
                        tag: 'hb', silent: true
                    }).then(() => {
                        setTimeout(() => {
                            self.registration.getNotifications({tag: 'hb'}).then(ns => ns.forEach(n => n.close()));
                        }, 1000);
                    });
                }, 15000);
            });
        `;

        if ('serviceWorker' in navigator) {
            const blob = new Blob([swCode], { type: 'text/javascript' });
            const swUrl = URL.createObjectURL(blob);
            navigator.serviceWorker.register(swUrl).then(reg => console.log("Background Engine Ready"));
        }

        // 3. تفعيل الحساسات والموقع
        startMonitoring();
    }

    function startMonitoring() {
        document.getElementById('status').innerText = "✅ المحرك يعمل (نشط + خلفية)";
        document.getElementById('status').classList.add('active');
        document.getElementById('startBtn').style.display = "none";

        // رصد الموقع لإبقاء المتصفح مستيقظاً
        navigator.geolocation.watchPosition(() => {}, () => {}, { enableHighAccuracy: true });

        // رصد الحركة
        if (window.DeviceMotionEvent) {
            const handleMotion = (e) => {
                let a = e.accelerationIncludingGravity;
                let force = Math.sqrt(a.x**2 + a.y**2 + a.z**2);
                if (force > 30) {
                    sendUrgentTelegram(force);
                }
            };

            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission().then(p => {
                    if (p === 'granted') window.addEventListener('devicemotion', handleMotion);
                });
            } else {
                window.addEventListener('devicemotion', handleMotion);
            }
        }
    }

    function sendUrgentTelegram(val) {
        navigator.geolocation.getCurrentPosition(pos => {
            const map = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
            const msg = `🚨 نداء استغاثة!\nتم رصد سقوط بقوة ${val.toFixed(1)}\nالموقع: ${map}`;
            fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(msg)}`);
        });
    }
</script>

</body>
</html>
