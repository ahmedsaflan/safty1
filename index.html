<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام السلامة - النافذة العائمة</title>
    <style>
        :root { --main-bg: #f8f9fa; --accent: #28a745; --danger: #dc3545; }
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: var(--main-bg); padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        canvas { border: 1px solid #ccc; display: none; } /* اللوحة المخفية التي تحول البيانات لفيديو */
        video { width: 100%; border-radius: 10px; background: #000; display: none; }
        .btn { padding: 15px; font-size: 1.1rem; cursor: pointer; border: none; border-radius: 12px; width: 100%; margin-top: 10px; font-weight: bold; color: white; }
        .btn-pip { background: #007bff; }
        .btn-start { background: var(--accent); }
        #status { margin: 15px 0; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h2>🛡️ وضع النافذة العائمة</h2>
        <div id="status">1. اضغط "بدء الرصد"<br>2. اضغط "تفعيل النافذة المصغرة"</div>
        
        <canvas id="renderCanvas" width="300" height="200"></canvas>
        <video id="pipVideo" autoplay muted playsinline></video>

        <button id="startBtn" class="btn btn-start" onclick="initSystem()">1. بدء الرصد</button>
        <button id="pipBtn" class="btn btn-pip" onclick="togglePiP()" style="display:none;">2. تفعيل النافذة المصغرة</button>
    </div>

    <script>
        const TG_TOKEN = "8633912015:AAGxck5kIDmVYJhcgx_SLb94LWomH9uxwpU";
        const CHAT_ID = "1400827294";

        const canvas = document.getElementById('renderCanvas');
        const ctx = canvas.getContext('2d');
        const video = document.getElementById('pipVideo');
        
        let liveAcc = 0, maxAcc = 0, statusText = "جاري الرصد...";
        let isFallDetected = false;

        // دالة لتحديث الرسم على اللوحة (Canvas) لتحويلها لفيديو
        function updateCanvas() {
            ctx.fillStyle = isFallDetected ? "#dc3545" : "#28a745";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = "white";
            ctx.font = "bold 20px Arial";
            ctx.textAlign = "center";
            ctx.fillText(statusText, 150, 50);
            
            ctx.font = "40px Monospace";
            ctx.fillText(liveAcc.toFixed(2), 150, 110);
            
            ctx.font = "15px Arial";
            ctx.fillText("أقصى ارتطام: " + maxAcc.toFixed(2), 150, 160);
            
            requestAnimationFrame(updateCanvas);
        }

        async function initSystem() {
            // تشغيل الحساسات
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                const state = await DeviceMotionEvent.requestPermission();
                if (state === 'granted') startMonitoring();
            } else { startMonitoring(); }
        }

        function startMonitoring() {
            window.addEventListener('devicemotion', (e) => {
                let acc = e.accelerationIncludingGravity;
                if (!acc.x) return;
                liveAcc = Math.sqrt(acc.x**2 + acc.y**2 + acc.z**2);
                if (liveAcc > maxAcc) maxAcc = liveAcc;
                
                if (!isFallDetected && liveAcc > 22) {
                    isFallDetected = true;
                    statusText = "⚠️ سقوط!!";
                    sendToTelegram(`🚨 تنبيه: تم رصد سقوط!`);
                }
            });

            // تحويل الـ Canvas إلى بث فيديو
            const stream = canvas.captureStream();
            video.srcObject = stream;
            
            document.getElementById('startBtn').style.display = "none";
            document.getElementById('pipBtn').style.display = "block";
            updateCanvas();
        }

        async function togglePiP() {
            try {
                if (document.pictureInPictureElement) {
                    await document.exitPictureInPicture();
                } else {
                    await video.requestPictureInPicture();
                }
            } catch (err) {
                alert("متصفحك لا يدعم النافذة العائمة أو تحتاج للتفاعل مع الصفحة أولاً");
            }
        }

        function sendToTelegram(msg) {
            fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(msg)}`);
        }
    </script>
</body>
</html>
