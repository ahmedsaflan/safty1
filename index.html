<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام السلامة - نسخة التحكم الكامل</title>
    <style>
        :root { --main-bg: #f8f9fa; --accent: #28a745; --danger: #dc3545; --warning: #ffc107; --cancel: #6c757d; }
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: var(--main-bg); margin: 0; padding: 20px; transition: 0.3s; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 450px; margin: auto; }
        #status { font-size: 1.2rem; margin: 15px 0; font-weight: bold; color: #2c3e50; min-height: 1.6em; }
        .monitor-box { display: flex; justify-content: space-around; margin: 20px 0; gap: 10px; }
        .data-point { flex: 1; background: #e7f3ff; padding: 15px; border-radius: 12px; }
        .value { font-size: 1.5rem; font-weight: bold; color: #007bff; font-family: monospace; }
        #countdown-box { display: none; font-size: 4.5rem; color: var(--danger); font-weight: bold; margin: 10px 0; }
        
        .btn { padding: 18px; font-size: 1.2rem; cursor: pointer; border: none; border-radius: 50px; width: 100%; transition: 0.2s; margin-top: 10px; }
        .btn-start { background: var(--accent); color: white; }
        .btn-cancel { background: var(--cancel); color: white; display: none; }
        
        .waiting { background: var(--warning) !important; }
        .emergency { background: var(--danger) !important; color: white !important; }
    </style>
</head>
<body>

    <div class="card">
        <h2>🛡️ نظام السلامة الذكي</h2>
        <div id="status">اضغط للبدء بالحماية</div>
        <div id="countdown-box">5</div>

        <div class="monitor-box">
            <div class="data-point"><span style="font-size: 0.8rem;">التسارع</span><div id="live-val" class="value">0.00</div></div>
            <div class="data-point" style="background: #fff4e6;"><span style="font-size: 0.8rem;">الارتطام</span><div id="max-val" class="value" style="color: #fd7e14;">0.00</div></div>
        </div>

        <button id="mainBtn" class="btn btn-start" onclick="initSystem()">تشغيل الرصد</button>
        <button id="cancelBtn" class="btn btn-cancel" onclick="resetSystem()">إلغاء الإنذار (أنا بخير ✅)</button>
    </div>

    <script>
        const TG_TOKEN = "8633912015:AAGxck5kIDmVYJhcgx_SLb94LWomH9uxwpU";
        const CHAT_ID = "1400827294";
        
        let isFallDetected = false;
        let canCancelByMove = false;
        let maxImpact = 0;
        let countdownValue = 5;
        let timer;
        let audioOsc; // لتخزين كائن الصوت للتمكن من إيقافه

        const IMPACT_THRESHOLD = 22;

        function initSystem() {
            navigator.geolocation.getCurrentPosition(()=>{}, ()=>{alert("تفعيل الموقع ضروري!")});
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission().then(state => { if (state === 'granted') startMonitoring(); });
            } else { startMonitoring(); }
        }

        function startMonitoring() {
            document.getElementById('mainBtn').style.display = 'none';
            document.getElementById('status').innerText = "النظام يراقب سلامتك الآن.. ✅";
            window.addEventListener('devicemotion', handleMotion);
        }

        function handleMotion(event) {
            let acc = event.accelerationIncludingGravity;
            if (!acc || acc.x === null) return;
            let totalAcc = Math.sqrt(acc.x**2 + acc.y**2 + acc.z**2);
            document.getElementById('live-val').innerText = totalAcc.toFixed(2);

            if (totalAcc > maxImpact) {
                maxImpact = totalAcc;
                document.getElementById('max-val').innerText = maxImpact.toFixed(2);
            }

            if (!isFallDetected && totalAcc > IMPACT_THRESHOLD) {
                isFallDetected = true;
                triggerWaitingSequence();
            }

            // الإلغاء عبر الحركة (تلقائي)
            if (isFallDetected && canCancelByMove) {
                let move = event.acceleration;
                if (Math.abs(move.x) > 3 || Math.abs(move.y) > 3 || Math.abs(move.z) > 3) {
                    resetSystem();
                }
            }
        }

        function triggerWaitingSequence() {
            document.body.className = "waiting";
            document.getElementById('status').innerText = "⚠️ تم رصد ارتطام! هل أنت بخير؟";
            document.getElementById('countdown-box').style.display = "block";
            document.getElementById('cancelBtn').style.display = "block"; // إظهار زر الإلغاء اليدوي
            
            canCancelByMove = false;
            setTimeout(() => { canCancelByMove = true; }, 1500);

            countdownValue = 5;
            document.getElementById('countdown-box').innerText = countdownValue;
            
            timer = setInterval(() => {
                countdownValue--;
                document.getElementById('countdown-box').innerText = countdownValue;
                if (countdownValue <= 0) {
                    clearInterval(timer);
                    if (isFallDetected) finalEmergency();
                }
            }, 1000);
        }

        function resetSystem() {
            clearInterval(timer);
            if (audioOsc) { audioOsc.stop(); audioOsc = null; } // إيقاف الصوت عند الضغط على إلغاء
            
            isFallDetected = false;
            canCancelByMove = false;
            document.body.className = "";
            document.getElementById('status').innerText = "تم الإلغاء. النظام يعمل مجدداً ✅";
            document.getElementById('countdown-box').style.display = "none";
            document.getElementById('cancelBtn').style.display = "none";
        }

        function finalEmergency() {
            document.body.className = "emergency";
            document.getElementById('status').innerText = "🚨 إرسال نداء استغاثة عاجل...";
            document.getElementById('countdown-box').innerText = "🆘";
            
            // تشغيل صوت الإنذار بشكل مستمر
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            audioOsc = ctx.createOscillator();
            audioOsc.type = 'sawtooth';
            audioOsc.connect(ctx.destination);
            audioOsc.start();

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    const mapUrl = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                    sendToTelegram(`🔔 *تنبيه سقوط طارئ*\n📍 الموقع: ${mapUrl}`);
                }, () => {
                    sendToTelegram(`🔔 *تنبيه سقوط طارئ*\n(الموقع غير متوفر)`);
                });
            }
        }

        function sendToTelegram(message) {
            // إضافة disable_notification=false تضمن وصول التنبيه بصوت في التليجرام
            const url = `https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(message)}&parse_mode=Markdown&disable_notification=false`;
            fetch(url).catch(err => console.error("Error sending message"));
        }
    </script>
</body>
</html>
