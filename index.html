<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام حماية كبار السن - Wrtgo</title>
    <style>
        :root { --main-bg: #f0f2f5; --accent: #28a745; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; text-align: center; background: var(--main-bg); transition: background 0.3s; margin: 0; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        #status { font-size: 1.3rem; margin: 20px 0; font-weight: bold; color: #333; }
        #live-data { font-size: 1rem; color: #007bff; background: #e7f3ff; padding: 10px; border-radius: 8px; margin-bottom: 20px; display: none; }
        .btn-start { padding: 15px 40px; font-size: 1.2rem; cursor: pointer; background: var(--accent); color: white; border: none; border-radius: 50px; transition: 0.3s; }
        .emergency { background: #ff4d4d !important; color: white !important; }
        #location-url { margin-top: 15px; font-weight: bold; }
        a { color: #ff4d4d; text-decoration: none; border-bottom: 2px solid; }
    </style>
</head>
<body>

    <div class="card">
        <h2>نظام رصد السقوط 🚨</h2>
        <div id="status">بانتظار التفعيل...</div>
        <div id="live-data">قوة الحركة: 0.00</div>
        <button id="mainBtn" class="btn-start" onclick="initSystem()">تفعيل الرصد</button>
        <div id="location-url"></div>
    </div>

    <script>
        let isFallDetected = false;
        let inactivityTimer;

        // --- إعدادات التحكم (تستطيع تغييرها من هنا بسهولة) ---
        const IMPACT_THRESHOLD = 22;    // قوة الارتطام المطلوبة
        const INACTIVITY_TIME = 5000;   // وقت الانتظار (5000 ملي ثانية = 5 ثواني) 👈 غير هذا الرقم
        // --------------------------------------------------

        function initSystem() {
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission().then(state => {
                    if (state === 'granted') startMonitoring();
                }).catch(console.error);
            } else {
                startMonitoring();
            }
        }

        function startMonitoring() {
            document.getElementById('mainBtn').style.display = 'none';
            document.getElementById('live-data').style.display = 'block';
            document.getElementById('status').innerText = "جاري الرصد... ✅";
            window.addEventListener('devicemotion', handleMotion);
        }

        function handleMotion(event) {
            let acc = event.accelerationIncludingGravity;
            if (!acc || acc.x === null) return;

            let totalAcc = Math.sqrt(acc.x**2 + acc.y**2 + acc.z**2);
            document.getElementById('live-data').innerText = "قوة الحركة الحالية: " + totalAcc.toFixed(2);

            if (isFallDetected) return;

            if (totalAcc > IMPACT_THRESHOLD) {
                isFallDetected = true;
                document.getElementById('status').innerText = "⚠️ ارتطام! انتظر " + (INACTIVITY_TIME/1000) + " ثوانٍ...";
                document.body.style.background = "#fff3cd"; 
                checkInactivity();
            }
        }

        function checkInactivity() {
            inactivityTimer = setTimeout(() => {
                triggerAlert();
            }, INACTIVITY_TIME);

            const cancelOnMotion = (e) => {
                let a = e.acceleration;
                if (Math.abs(a.x) > 2 || Math.abs(a.y) > 2) {
                    clearTimeout(inactivityTimer);
                    isFallDetected = false;
                    document.getElementById('status').innerText = "جاري الرصد... ✅";
                    document.body.style.background = "#f0f2f5";
                    window.removeEventListener('devicemotion', cancelOnMotion);
                }
            };
            window.addEventListener('devicemotion', cancelOnMotion);
        }

        function triggerAlert() {
            document.body.classList.add('emergency');
            document.getElementById('status').innerText = "🚨 حالة طارئة: تم رصد سقوط!";
            playAlarm();
            getGeoLocation();
        }

        function getGeoLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    const url = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                    document.getElementById('location-url').innerHTML = `<a href="${url}" target="_blank" style="color:white">رابط موقع المصاب</a>`;
                });
            }
        }

        function playAlarm() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(880, ctx.currentTime);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start();
            setInterval(() => { gain.gain.value = gain.gain.value === 0 ? 1 : 0; }, 150);
        }
    </script>
</body>
</html>
