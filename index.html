<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeGuard Pro</title>
    <style>
        :root { --primary: #27ae60; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .card { background: white; padding: 30px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; width: 85%; max-width: 400px; }
        .icon { font-size: 5rem; margin-bottom: 15px; }
        h2 { font-size: 1.8rem; color: #2c3e50; margin: 10px 0; }
        .status { margin: 20px 0; padding: 15px; border-radius: 15px; background: #ebebeb; font-weight: bold; font-size: 1.2rem; }
        .active-status { background: #d4edda; color: #155724; border: 2px solid var(--primary); }
        .btn { background: var(--primary); color: white; border: none; padding: 20px; font-size: 1.5rem; border-radius: 20px; width: 100%; cursor: pointer; font-weight: bold; box-shadow: 0 5px 15px rgba(39, 174, 96, 0.3); }
        #log { font-size: 0.9rem; color: #888; margin-top: 15px; }
    </style>
</head>
<body>

<div class="card">
    <div class="icon" id="icon">🛡️</div>
    <h2>نظام الحماية</h2>
    <div id="status" class="status">جاهز للتشغيل</div>
    <button id="startBtn" class="btn" onclick="activateSystem()">بدء الحماية</button>
    <div id="log">النسخة المطورة للعمل في الخلفية</div>
</div>

<audio id="silentMode" loop>
    <source src="https://raw.githubusercontent.com/anars/blank-audio/master/10-seconds-of-silence.mp3" type="audio/mp3">
</audio>

<script>
    const TG_TOKEN = "8633912015:AAGxck5kIDmVYJhcgx_SLb94LWomH9uxwpU";
    const CHAT_ID = "1400827294";

    async function activateSystem() {
        // 1. تشغيل الصوت الصامت (هذا هو سر العمل في الخلفية)
        const audio = document.getElementById('silentMode');
        audio.play().catch(e => console.log("Audio needs user interaction"));

        // 2. تحديث الواجهة
        document.getElementById('startBtn').style.display = "none";
        document.getElementById('status').innerText = "✅ الحماية نشطة الآن";
        document.getElementById('status').classList.add('active-status');
        document.getElementById('icon').innerText = "🟢";

        // 3. نطق تأكيدي
        speak("تم تفعيل الحماية المستمرة");

        // 4. طلب أذونات الحساسات وبدء الرصد
        if (typeof DeviceMotionEvent.requestPermission === 'function') {
            const p = await DeviceMotionEvent.requestPermission();
            if (p === 'granted') startMonitoring();
        } else {
            startMonitoring();
        }
    }

    function startMonitoring() {
        // إبقاء الـ GPS يعمل (محرك إضافي للاستيقاظ)
        navigator.geolocation.watchPosition(() => {}, () => {}, { enableHighAccuracy: true });

        window.addEventListener('devicemotion', (e) => {
            let acc = e.accelerationIncludingGravity;
            if (!acc || acc.x === null) return;

            let total = Math.sqrt(acc.x**2 + acc.y**2 + acc.z**2);
            
            // حساسية متوازنة (23)
            if (total > 23) {
                sendEmergency(total);
            }
        });
    }

    function sendEmergency(val) {
        speak("تنبيه، تم رصد سقوط");
        navigator.geolocation.getCurrentPosition(pos => {
            const map = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
            const msg = `🚨 استغاثة: تم رصد سقوط بقوة ${val.toFixed(1)}\nالموقع: ${map}`;
            fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(msg)}`);
        });
    }

    function speak(t) {
        const m = new SpeechSynthesisUtterance(t);
        m.lang = 'ar-SA';
        window.speechSynthesis.speak(m);
    }
</script>

</body>
</html>
